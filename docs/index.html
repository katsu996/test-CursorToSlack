<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <!-- beatoraja: Table URL にサイトのトップ（.json で終わらない URL）を入れたとき、jbmstable-parser がこの meta からヘッダー JSON を解決する -->
  <meta name="bmstable" content="table/filtered_header.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K Original難易度表</title>
  <style>
    /*
      静的 HTML のため npm の shadcn/ui は未使用。
      shadcn/ui（zinc 系）のデザイントークンと Button / Card / Input 相当の見た目を CSS で再現。
    */
    html {
      color-scheme: light dark;
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --secondary: 240 4.8% 95.9%;
      --secondary-foreground: 240 5.9% 10%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 240 5.9% 10%;
      --radius: 0.5rem;
      --group-t: 221 83% 96%;
      --group-d: 142 76% 94%;
      --row-alt: 240 5% 98%;
      --link: 221 83% 53%;
    }
    @media (prefers-color-scheme: dark) {
      html:not(.theme-light):not(.theme-dark) {
        --background: 240 10% 3.9%;
        --foreground: 0 0% 98%;
        --card: 240 10% 3.9%;
        --card-foreground: 0 0% 98%;
        --popover: 240 10% 3.9%;
        --popover-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --primary-foreground: 240 5.9% 10%;
        --secondary: 240 3.7% 15.9%;
        --secondary-foreground: 0 0% 98%;
        --muted: 240 3.7% 15.9%;
        --muted-foreground: 240 5% 64.9%;
        --accent: 240 3.7% 15.9%;
        --accent-foreground: 0 0% 98%;
        --destructive: 0 62.8% 30.6%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 3.7% 15.9%;
        --input: 240 3.7% 15.9%;
        --ring: 240 4.9% 83.9%;
        --group-t: 224 76% 16%;
        --group-d: 143 64% 14%;
        --row-alt: 240 4% 9%;
        --link: 217 91% 60%;
      }
    }
    html.theme-dark {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --popover: 240 10% 3.9%;
      --popover-foreground: 0 0% 98%;
      --primary: 0 0% 98%;
      --primary-foreground: 240 5.9% 10%;
      --secondary: 240 3.7% 15.9%;
      --secondary-foreground: 0 0% 98%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;
      --input: 240 3.7% 15.9%;
      --ring: 240 4.9% 83.9%;
      --group-t: 224 76% 16%;
      --group-d: 143 64% 14%;
      --row-alt: 240 4% 9%;
      --link: 217 91% 60%;
    }
    html.theme-light {
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --secondary: 240 4.8% 95.9%;
      --secondary-foreground: 240 5.9% 10%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 240 5.9% 10%;
      --group-t: 221 83% 96%;
      --group-d: 142 76% 94%;
      --row-alt: 240 5% 98%;
      --link: 221 83% 53%;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      margin: 0;
      padding: 1rem 1rem 2rem;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 100%; margin: 0 auto; }
    .site-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.2;
      margin: 0;
    }
    /* shadcn Button variant="outline" size="default" 相当 */
    .shadcn-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      white-space: nowrap;
      border-radius: calc(var(--radius) - 2px);
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.25rem;
      height: 2.25rem;
      padding: 0 0.875rem;
      border: 1px solid hsl(var(--input));
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      cursor: pointer;
      transition: color 0.15s, background-color 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .shadcn-btn:hover {
      background-color: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
    }
    .shadcn-btn:focus-visible {
      outline: 2px solid hsl(var(--ring));
      outline-offset: 2px;
    }
    .shadcn-btn-icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .shadcn-btn-icon-wrap svg {
      display: block;
    }
    .shadcn-btn-text { font-size: 0.8125rem; }
    /* shadcn Card 相当 */
    .shadcn-card {
      background-color: hsl(var(--card));
      color: hsl(var(--card-foreground));
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }
    .lead { color: hsl(var(--muted-foreground)); margin: 0 0 1rem; font-size: 0.875rem; }
    .meta {
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.8125rem;
    }
    .meta dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 0.25rem 1rem; }
    .meta dt { color: hsl(var(--muted-foreground)); font-weight: 500; }
    .meta dd { margin: 0; word-break: break-all; }
    .sortbar {
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;
      padding: 0.65rem 0.85rem;
      margin-bottom: 0.75rem;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .sortbar label { font-size: 0.8125rem; color: hsl(var(--muted-foreground)); white-space: nowrap; font-weight: 500; }
    /* shadcn Select 相当 */
    .shadcn-select {
      height: 2.25rem;
      padding: 0 0.625rem;
      border: 1px solid hsl(var(--input));
      border-radius: calc(var(--radius) - 2px);
      font-size: 0.875rem;
      min-width: 10rem;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }
    .shadcn-select:focus-visible {
      outline: 2px solid hsl(var(--ring));
      outline-offset: 2px;
    }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;
      margin-bottom: 0;
    }
    .toolbar label { font-size: 0.8125rem; color: hsl(var(--muted-foreground)); font-weight: 500; }
    .filter-collapse {
      margin-bottom: 0.75rem;
      padding: 0;
      overflow: hidden;
    }
    .filter-collapse-toggle {
      width: 100%;
      border-radius: var(--radius);
      border: none;
      box-shadow: none;
      justify-content: space-between;
      padding: 0.65rem 0.85rem;
      font-weight: 600;
    }
    .filter-collapse-toggle:hover { box-shadow: none; }
    .filter-collapse-panel {
      padding: 0.65rem 0.85rem 0.75rem;
      border-top: 1px solid hsl(var(--border));
    }
    .filter-collapse-panel .toolbar { margin-bottom: 0.65rem; }
    .filter-collapse-panel .filter-src { margin-bottom: 0; }
    .filter-chevron {
      font-size: 0.7rem;
      opacity: 0.8;
      margin-left: 0.35rem;
    }
    /* shadcn Input 相当 */
    .shadcn-input {
      flex: 1 1 12rem;
      min-width: 8rem;
      height: 2.25rem;
      padding: 0 0.625rem;
      border: 1px solid hsl(var(--input));
      border-radius: calc(var(--radius) - 2px);
      font-size: 0.875rem;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }
    .shadcn-input:focus-visible {
      outline: 2px solid hsl(var(--ring));
      outline-offset: 2px;
    }
    .filter-src {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem 0.75rem;
      margin-bottom: 0.65rem;
      font-size: 0.8125rem;
      color: hsl(var(--muted-foreground));
      padding: 0.55rem 0.75rem;
    }
    .filter-src > span:first-child { font-weight: 500; color: hsl(var(--foreground)); margin-right: 0.25rem; }
    .filter-src label {
      display: inline-flex; align-items: center; gap: 0.4rem;
      cursor: pointer; user-select: none;
      padding: 0.25rem 0.5rem;
      border-radius: calc(var(--radius) - 2px);
      border: 1px solid hsl(var(--border));
      background: hsl(var(--secondary) / 0.35);
      color: hsl(var(--foreground));
      font-size: 0.8125rem;
      transition: background-color 0.15s, border-color 0.15s;
    }
    .filter-src label:hover { background-color: hsl(var(--accent)); }
    .filter-src input { margin: 0; accent-color: hsl(var(--primary)); }
    .colbar {
      padding: 0.65rem 0.85rem;
      margin-bottom: 0.75rem;
      font-size: 0.75rem;
      max-height: 16rem;
      overflow: auto;
    }
    .colbar > .colbar-lead {
      margin: 0 0 0.5rem;
      font-size: 0.8125rem;
      color: hsl(var(--muted-foreground));
    }
    .colbar-group { margin-bottom: 0.5rem; }
    .colbar-group:last-child { margin-bottom: 0; }
    .colbar-group-title {
      font-weight: 600;
      margin: 0 0 0.35rem;
      font-size: 0.75rem;
      color: hsl(var(--foreground));
      letter-spacing: 0.02em;
    }
    .colbar-group-title.t { color: hsl(221 83% 40%); }
    .colbar-group-title.d { color: hsl(142 76% 30%); }
    html.theme-dark .colbar-group-title.t { color: hsl(217 91% 70%); }
    html.theme-dark .colbar-group-title.d { color: hsl(142 71% 55%); }
    @media (prefers-color-scheme: dark) {
      html:not(.theme-light):not(.theme-dark) .colbar-group-title.t { color: hsl(217 91% 70%); }
      html:not(.theme-light):not(.theme-dark) .colbar-group-title.d { color: hsl(142 71% 55%); }
    }
    .colpick-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.5rem;
      align-items: center;
    }
    label.colpick {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
      cursor: pointer;
      padding: 0.2rem 0.45rem;
      border-radius: calc(var(--radius) - 4px);
      border: 1px solid hsl(var(--border));
      background: hsl(var(--secondary) / 0.25);
      user-select: none;
      font-size: 0.72rem;
      transition: background-color 0.15s;
    }
    label.colpick:hover { background-color: hsl(var(--accent)); }
    label.colpick input { margin: 0; accent-color: hsl(var(--primary)); }
    .scroll {
      overflow: auto;
      max-height: min(78vh, 900px);
    }
    table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      white-space: nowrap;
    }
    th, td {
      border: 1px solid hsl(var(--border));
      padding: 0.4rem 0.55rem;
      text-align: left;
      vertical-align: top;
    }
    th {
      background-color: hsl(var(--muted));
      color: hsl(var(--foreground));
      position: sticky;
      top: 0;
      z-index: 2;
      font-weight: 600;
    }
    th.group-t { background-color: hsl(var(--group-t)); color: hsl(var(--foreground)); }
    th.group-d { background-color: hsl(var(--group-d)); color: hsl(var(--foreground)); }
    tr:nth-child(even) td { background-color: hsl(var(--row-alt) / 0.85); }
    tr:hover td { background-color: hsl(var(--accent)); }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.empty { color: hsl(var(--muted-foreground)); }
    a { color: hsl(var(--link)); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
    .err {
      color: hsl(var(--destructive));
      padding: 0.875rem 1rem;
      background-color: hsl(var(--destructive) / 0.12);
      border: 1px solid hsl(var(--destructive) / 0.35);
      border-radius: var(--radius);
      font-size: 0.875rem;
    }
    code {
      background-color: hsl(var(--muted));
      color: hsl(var(--foreground));
      padding: 0.1em 0.35em;
      border-radius: calc(var(--radius) - 4px);
      font-size: 0.8125em;
    }
    footer { margin-top: 1.25rem; font-size: 0.8125rem; color: hsl(var(--muted-foreground)); }
    .shadcn-link {
      display: inline-flex;
      align-items: center;
      height: 2.25rem;
      padding: 0 0.75rem;
      border-radius: calc(var(--radius) - 2px);
      font-size: 0.875rem;
      font-weight: 500;
      color: hsl(var(--foreground));
      border: 1px solid hsl(var(--input));
      background: hsl(var(--background));
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      transition: background-color 0.15s;
    }
    .shadcn-link:hover { background-color: hsl(var(--accent)); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <h1 id="site-h1">K Original難易度表</h1>
      <button type="button" class="shadcn-btn" id="theme-toggle" aria-label="配色を切り替え">
        <span class="shadcn-btn-icon-wrap" id="theme-toggle-icon" aria-hidden="true"></span>
        <span class="shadcn-btn-text" id="theme-toggle-text">自動</span>
      </button>
    </header>
    <div id="meta" class="meta shadcn-card" hidden>
      <dl id="meta-dl"></dl>
    </div>
    <div class="sortbar shadcn-card">
      <label for="sort-col">行の並び替え（基準列）</label>
      <select id="sort-col" class="shadcn-select" disabled>
        <option value="">元の順（データの行順）</option>
      </select>
      <label for="sort-dir">順序</label>
      <select id="sort-dir" class="shadcn-select" disabled>
        <option value="asc">昇順</option>
        <option value="desc">降順</option>
      </select>
    </div>
    <div class="filter-collapse shadcn-card">
      <button type="button" class="shadcn-btn filter-collapse-toggle" id="filter-panel-toggle" aria-expanded="false" aria-controls="filter-panel">
        <span>絞り込み</span>
        <span class="filter-chevron" aria-hidden="true">▼</span>
      </button>
      <div id="filter-panel" class="filter-collapse-panel" hidden>
        <div class="toolbar">
          <label for="q">キーワード</label>
          <input type="search" id="q" class="shadcn-input" placeholder="タイトル・ハッシュなど" autocomplete="off" disabled />
          <span id="count" class="lead" style="margin:0"></span>
        </div>
        <div id="filter-src-bar" class="filter-src" hidden></div>
      </div>
    </div>
    <div id="colbar" class="colbar shadcn-card" hidden>
      <p class="colbar-lead">
        列の表示切替（1 列ごとにチェック）。追加の列にチェックを入れると表に出ます。
      </p>
      <div id="colbar-inner"></div>
    </div>
    <div id="err" class="err" hidden></div>
    <div class="scroll shadcn-card" id="scroll" hidden>
      <table id="tbl">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <footer>
      <a class="shadcn-link" href="./level-stats.html">元難易度表別の曲数</a>
    </footer>
  </div>
  <script>
(function () {
  var THEME_STORAGE = "k-original-color-scheme";

  var THEME_ICONS = {
    system: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>',
    light: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    dark: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>'
  };

  function applyThemeClass(mode) {
    var html = document.documentElement;
    html.classList.remove("theme-light", "theme-dark");
    if (mode === "light") html.classList.add("theme-light");
    else if (mode === "dark") html.classList.add("theme-dark");
  }

  function storedThemeMode() {
    var v = localStorage.getItem(THEME_STORAGE);
    if (v === "light" || v === "dark") return v;
    return "system";
  }

  function setThemeButtonLabel(btn, mode) {
    if (!btn) return;
    var label = mode === "light" ? "ライト" : mode === "dark" ? "ダーク" : "自動";
    var iconKey = mode === "light" ? "light" : mode === "dark" ? "dark" : "system";
    var iconEl = document.getElementById("theme-toggle-icon");
    var textEl = document.getElementById("theme-toggle-text");
    if (iconEl) iconEl.innerHTML = THEME_ICONS[iconKey] || "";
    if (textEl) textEl.textContent = label;
    btn.setAttribute("aria-label", "配色: " + label + "（クリックで切替）");
    btn.title = "配色: " + label + "（クリックで 自動→ライト→ダーク→自動）";
  }

  function initThemeToggle() {
    var mode = storedThemeMode();
    applyThemeClass(mode === "system" ? null : mode);
    var btn = document.getElementById("theme-toggle");
    setThemeButtonLabel(btn, mode);
    if (!btn) return;
    btn.addEventListener("click", function () {
      var cur = storedThemeMode();
      var next = cur === "system" ? "light" : cur === "light" ? "dark" : "system";
      if (next === "system") localStorage.removeItem(THEME_STORAGE);
      else localStorage.setItem(THEME_STORAGE, next);
      var m = storedThemeMode();
      applyThemeClass(m === "system" ? null : m);
      setThemeButtonLabel(btn, m);
    });
  }

  initThemeToggle();

  (function initFilterCollapse() {
    var btn = document.getElementById("filter-panel-toggle");
    var panel = document.getElementById("filter-panel");
    var chev = btn && btn.querySelector(".filter-chevron");
    if (!btn || !panel) return;
    btn.addEventListener("click", function () {
      var willOpen = panel.hidden;
      panel.hidden = !willOpen;
      btn.setAttribute("aria-expanded", willOpen ? "true" : "false");
      if (chev) chev.textContent = willOpen ? "▲" : "▼";
    });
  })();

  /** 既定でオフにする列（チェックボックスで表示可能） */
  var HIDDEN_KEYS = {
    id: true,
    source_table_index: true,
    source_table_names: true,
    path: true, preview: true, banner: true, stagefile: true, backbmp: true,
    tag: true, parent: true, mode: true, judge: true, feature: true, content: true,
    favorite: true, adddate: true,
    url: true, url_diff: true,
    source_header_json_url: true, source_table_register_url: true,
    folder: true
  };

  var LABELS = {
    id: "表 ID",
    source_table_index: "出自表（番号）",
    source_table_short_names: "シンボル",
    source_table_names: "出自（フル）",
    md5: "MD5", sha256: "SHA256", title: "表タイトル", artist: "表アーティスト",
    level: "表レベル", custom_level: "独自レベル", url: "リンク", url_diff: "差分URL",
    subtitle: "サブタイトル", genre: "ジャンル", subartist: "サブアーティスト",
    folder: "フォルダID", difficulty: "difficulty", maxbpm: "max BPM", minbpm: "min BPM",
    length: "長さ(秒?)", notes: "ノーツ数", charthash: "charthash", date: "ファイル日時"
  };

  function tableColTitle(k) {
    return LABELS[k] || ("表: " + k);
  }

  function dbColTitle(k) {
    return LABELS[k] || ("DB: " + k);
  }

  function fmt(val) {
    if (val === null || val === undefined) return "";
    if (typeof val === "number" && Number.isFinite(val)) return String(val);
    if (typeof val === "boolean") return val ? "true" : "false";
    if (Array.isArray(val)) {
      if (val.length && val.every(function (x) {
        return x === null || x === undefined || typeof x === "string" || typeof x === "number" || typeof x === "boolean";
      })) {
        return val.map(function (x) { return fmt(x); }).filter(function (s) { return s !== ""; }).join(" · ");
      }
    }
    if (typeof val === "object") {
      try { return JSON.stringify(val); } catch (e) { return String(val); }
    }
    return String(val);
  }

  function isNumericLike(val) {
    return typeof val === "number" && Number.isFinite(val);
  }

  /** 行データに現れるすべてのキー（非表示列も含む） */
  function collectAllKeys(rows, key) {
    var s = {};
    for (var i = 0; i < rows.length; i++) {
      var o = rows[i][key];
      if (o && typeof o === "object") {
        var ks = Object.keys(o);
        for (var j = 0; j < ks.length; j++) {
          s[ks[j]] = true;
        }
      }
    }
    var tablePri = [
      "id", "source_table_index", "source_table_short_names", "source_table_names", "title", "artist", "level", "custom_level",
      "md5", "sha256"
    ];
    var dbPriFull = [
      "title", "subtitle", "subartist", "artist", "genre", "path", "minbpm", "maxbpm", "notes", "length", "level",
      "difficulty", "md5", "sha256", "folder", "preview", "banner", "stagefile", "backbmp", "tag",
      "parent", "mode", "judge", "feature", "content", "date", "adddate", "favorite", "charthash"
    ];
    var pri = key === "table" ? tablePri : dbPriFull;
    var arr = Object.keys(s);
    var first = [];
    for (var p = 0; p < pri.length; p++) {
      if (s[pri[p]]) first.push(pri[p]);
    }
    var rest = arr.filter(function (k) { return pri.indexOf(k) < 0; }).sort();
    return first.concat(rest);
  }

  function defaultColumnVisible(k, section) {
    if (section === "db" && (k === "title" || k === "artist")) return false;
    if (section === "db" && (k === "md5" || k === "sha256")) return false;
    return !HIDDEN_KEYS[k];
  }

  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function cellHtml(val) {
    var t = fmt(val);
    if (!t) return '<td class="empty">—</td>';
    if (/^https?:\/\//i.test(t)) return '<td><a href="' + esc(t) + '" rel="noopener noreferrer">' + esc(t) + "</a></td>";
    var num = isNumericLike(val);
    return '<td class="' + (num ? "num" : "") + '">' + esc(t) + "</td>";
  }

  function getSortValue(r, spec) {
    if (!spec) return null;
    var parts = spec.split(":");
    if (parts.length < 2) return null;
    var grp = parts[0];
    var col = parts.slice(1).join(":");
    var o = grp === "table" ? r.table : r.db;
    if (!o || typeof o !== "object") return null;
    return o[col];
  }

  function compareVals(a, b) {
    var ae = a === null || a === undefined || a === "";
    var be = b === null || b === undefined || b === "";
    if (ae && be) return 0;
    if (ae) return 1;
    if (be) return -1;
    if (typeof a === "number" && typeof b === "number" && Number.isFinite(a) && Number.isFinite(b)) {
      if (a < b) return -1;
      if (a > b) return 1;
      return 0;
    }
    var sa = typeof a === "object" ? JSON.stringify(a) : String(a);
    var sb = typeof b === "object" ? JSON.stringify(b) : String(b);
    return sa.localeCompare(sb, "ja", { numeric: true, sensitivity: "base" });
  }

  var metaEl = document.getElementById("meta");
  var metaDl = document.getElementById("meta-dl");
  var filterSrcBar = document.getElementById("filter-src-bar");
  var errEl = document.getElementById("err");
  var scrollEl = document.getElementById("scroll");
  var colbarEl = document.getElementById("colbar");
  var colbarInner = document.getElementById("colbar-inner");
  var thead = document.getElementById("thead");
  var tbody = document.getElementById("tbody");
  var q = document.getElementById("q");
  var countEl = document.getElementById("count");
  var sortCol = document.getElementById("sort-col");
  var sortDir = document.getElementById("sort-dir");

  fetch("./table/browser_rows.json", { cache: "no-store" })
    .then(function (r) {
      if (!r.ok) throw new Error("browser_rows.json を取得できません (" + r.status + ")");
      return r.json();
    })
    .then(function (data) {
      var meta = data.meta || {};
      var rows = Array.isArray(data.rows) ? data.rows : [];
      var pt = meta.page_title && String(meta.page_title).trim();
      if (pt) {
        var h1el = document.getElementById("site-h1");
        if (h1el) h1el.textContent = pt;
        document.title = pt;
      }
      metaDl.innerHTML = "";
      var pairs = [
        ["行数", meta.row_count],
        ["songdata と一致", meta.matched_songdata],
        ["SQL 条件", meta.sql_where]
      ];
      var leg = meta.source_table_legend;
      if (Array.isArray(leg) && leg.length) {
        pairs.push(["元難易度表（表示名）", leg.join(" ／ ")]);
      }
      var legS = meta.source_table_legend_short;
      if (Array.isArray(legS) && legS.length) {
        pairs.push(["元難易度表（略称）", legS.join(" ／ ")]);
      }
      if (meta.custom_level_mapping_count) {
        pairs.push(
          ["独自レベル列", meta.custom_level_field],
          ["独自レベル元列", meta.custom_level_source_key],
          ["独自レベル未マップ時", meta.custom_level_unmapped],
          ["独自レベル マップ数（配列要素数）", meta.custom_level_mapping_count]
        );
      }
      pairs.push(["備考", meta.reason]);
      pairs.forEach(function (pair) {
        if (pair[1] === undefined || pair[1] === null || pair[1] === "") return;
        var dt = document.createElement("dt");
        dt.textContent = pair[0];
        var dd = document.createElement("dd");
        dd.textContent = String(pair[1]);
        metaDl.appendChild(dt);
        metaDl.appendChild(dd);
      });
      metaEl.hidden = metaDl.children.length === 0;

      var allTKeys = collectAllKeys(rows, "table");
      var allDKeys = collectAllKeys(rows, "db");
      var metaShorts = Array.isArray(meta.source_table_short_names) ? meta.source_table_short_names : [];
      var metaDisplays = Array.isArray(meta.source_table_display_names) ? meta.source_table_display_names : [];
      var sourceFilterState = {};

      function buildSourceFilterBar() {
        sourceFilterState = {};
        if (!filterSrcBar) return;
        var entries = [];
        for (var si = 0; si < metaShorts.length; si++) {
          var sh = String(metaShorts[si] || "").trim();
          if (!sh) continue;
          var dn = si < metaDisplays.length && String(metaDisplays[si] || "").trim()
            ? String(metaDisplays[si]).trim()
            : sh;
          entries.push({ short: sh, label: dn });
        }
        if (!entries.length) {
          filterSrcBar.hidden = true;
          return;
        }
        filterSrcBar.innerHTML = "";
        var lead = document.createElement("span");
        lead.textContent = "難易度表（1つ以上チェックした表のみ表示。すべてオフのときは行を表示しません）:";
        filterSrcBar.appendChild(lead);
        entries.forEach(function (e) {
          sourceFilterState[e.short] = true;
          var lab = document.createElement("label");
          var inp = document.createElement("input");
          inp.type = "checkbox";
          inp.checked = true;
          inp.addEventListener("change", function () {
            sourceFilterState[e.short] = inp.checked;
            refresh();
          });
          lab.appendChild(inp);
          lab.appendChild(document.createTextNode(e.short + "（" + e.label + "）"));
          filterSrcBar.appendChild(lab);
        });
        filterSrcBar.hidden = false;
      }

      function rowSourceTags(r) {
        var t = r.table || {};
        var out = {};
        var shorts = t.source_table_short_names;
        if (Array.isArray(shorts)) {
          for (var ri = 0; ri < shorts.length; ri++) {
            var s = String(shorts[ri] || "").trim();
            if (s) out[s] = true;
          }
        }
        if (!Object.keys(out).length && t.source_table_index != null && metaShorts.length) {
          var ix = Number(t.source_table_index);
          if (Number.isFinite(ix) && ix >= 1 && ix <= metaShorts.length) {
            var fb = String(metaShorts[ix - 1] || "").trim();
            if (fb) out[fb] = true;
          }
        }
        return out;
      }

      function applySourceFilter(base) {
        if (!Object.keys(sourceFilterState).length) return base.slice();
        var enabled = [];
        Object.keys(sourceFilterState).forEach(function (k) {
          if (sourceFilterState[k]) enabled.push(k);
        });
        if (!enabled.length) return [];
        return base.filter(function (r) {
          var tags = rowSourceTags(r);
          for (var ei = 0; ei < enabled.length; ei++) {
            if (tags[enabled[ei]]) return true;
          }
          return false;
        });
      }

      buildSourceFilterBar();

      var visT = {};
      var visD = {};
      allTKeys.forEach(function (k) { visT[k] = defaultColumnVisible(k, "table"); });
      allDKeys.forEach(function (k) { visD[k] = defaultColumnVisible(k, "db"); });

      function visibleKeys(allKeys, vis) {
        return allKeys.filter(function (k) { return vis[k]; });
      }

      function rebuildThead(vTKeys, vDKeys) {
        thead.innerHTML = "";
        var trh1 = document.createElement("tr");
        var thT = document.createElement("th");
        thT.colSpan = Math.max(1, vTKeys.length);
        thT.className = "group-t";
        thT.textContent = "難易度表 JSON の列";
        trh1.appendChild(thT);
        var thD = document.createElement("th");
        thD.colSpan = Math.max(1, vDKeys.length);
        thD.className = "group-d";
        thD.textContent = "songdata.db（song）の列";
        trh1.appendChild(thD);
        thead.appendChild(trh1);

        var trh2 = document.createElement("tr");
        vTKeys.forEach(function (k) {
          var th = document.createElement("th");
          th.className = "group-t";
          th.textContent = tableColTitle(k);
          trh2.appendChild(th);
        });
        if (!vTKeys.length) {
          var th0 = document.createElement("th");
          th0.className = "group-t";
          th0.textContent = "（表データなし）";
          trh2.appendChild(th0);
        }
        vDKeys.forEach(function (k) {
          var th = document.createElement("th");
          th.className = "group-d";
          th.textContent = dbColTitle(k);
          trh2.appendChild(th);
        });
        if (!vDKeys.length) {
          var th1 = document.createElement("th");
          th1.className = "group-d";
          th1.textContent = "（DB列なし）";
          trh2.appendChild(th1);
        }
        thead.appendChild(trh2);
      }

      function buildColPicker() {
        colbarInner.innerHTML = "";
        function addGroup(title, cls, allKeys, vis, prefix) {
          var wrap = document.createElement("div");
          wrap.className = "colbar-group";
          var h = document.createElement("div");
          h.className = "colbar-group-title " + cls;
          h.textContent = title;
          wrap.appendChild(h);
          var picks = document.createElement("div");
          picks.className = "colpick-wrap";
          allKeys.forEach(function (k) {
            var lab = document.createElement("label");
            lab.className = "colpick";
            var inp = document.createElement("input");
            inp.type = "checkbox";
            inp.checked = !!vis[k];
            inp.addEventListener("change", function () {
              vis[k] = inp.checked;
              var vT = visibleKeys(allTKeys, visT);
              var vD = visibleKeys(allDKeys, visD);
              rebuildThead(vT, vD);
              refresh();
            });
            lab.appendChild(inp);
            var span = document.createElement("span");
            span.textContent = prefix === "表: " ? ("表: " + tableColTitle(k)) : ("DB: " + dbColTitle(k));
            lab.appendChild(span);
            picks.appendChild(lab);
          });
          wrap.appendChild(picks);
          colbarInner.appendChild(wrap);
        }
        addGroup("難易度表 JSON の列", "t", allTKeys, visT, "表: ");
        addGroup("songdata.db（song）の列", "d", allDKeys, visD, "DB: ");
      }

      function rowText(r) {
        var t = r.table || {};
        var d = r.db || {};
        var parts = [];
        allTKeys.forEach(function (k) { parts.push(fmt(t[k])); });
        allDKeys.forEach(function (k) { parts.push(fmt(d ? d[k] : "")); });
        return parts.join(" ") + " " + JSON.stringify(t) + " " + JSON.stringify(d);
      }

      function fillSortSelect() {
        while (sortCol.options.length > 1) sortCol.remove(1);
        allTKeys.forEach(function (k) {
          var opt = document.createElement("option");
          opt.value = "table:" + k;
          opt.textContent = "表: " + tableColTitle(k);
          sortCol.appendChild(opt);
        });
        allDKeys.forEach(function (k) {
          var opt = document.createElement("option");
          opt.value = "db:" + k;
          opt.textContent = "DB: " + dbColTitle(k);
          sortCol.appendChild(opt);
        });
      }

      fillSortSelect();
      if (allTKeys.indexOf("title") >= 0) {
        sortCol.value = "table:title";
      } else if (allDKeys.indexOf("title") >= 0) {
        sortCol.value = "db:title";
      } else {
        sortCol.value = "";
      }
      sortDir.value = "asc";
      sortCol.disabled = false;
      sortDir.disabled = false;

      function render(list) {
        var vTKeys = visibleKeys(allTKeys, visT);
        var vDKeys = visibleKeys(allDKeys, visD);
        tbody.innerHTML = "";
        list.forEach(function (r) {
          var tr = document.createElement("tr");
          var t = r.table || {};
          var d = r.db || {};
          vTKeys.forEach(function (k) {
            tr.insertAdjacentHTML("beforeend", cellHtml(t[k]));
          });
          if (!vTKeys.length) tr.insertAdjacentHTML("beforeend", "<td class=\"empty\">—</td>");
          vDKeys.forEach(function (k) {
            tr.insertAdjacentHTML("beforeend", cellHtml(d ? d[k] : ""));
          });
          if (!vDKeys.length) tr.insertAdjacentHTML("beforeend", "<td class=\"empty\">—</td>");
          tbody.appendChild(tr);
        });
        countEl.textContent = list.length + " / " + rows.length + " 行を表示";
      }

      function applySearch() {
        var needle = (q.value || "").trim().toLowerCase();
        if (!needle) return rows.slice();
        return rows.filter(function (r) {
          return rowText(r).toLowerCase().indexOf(needle) >= 0;
        });
      }

      function applySort(base) {
        var spec = (sortCol.value || "").trim();
        if (!spec) return base.slice();
        var dir = sortDir.value === "desc" ? -1 : 1;
        return base.slice().sort(function (r1, r2) {
          return dir * compareVals(getSortValue(r1, spec), getSortValue(r2, spec));
        });
      }

      function refresh() {
        render(applySort(applySourceFilter(applySearch())));
      }

      buildColPicker();
      rebuildThead(visibleKeys(allTKeys, visT), visibleKeys(allDKeys, visD));
      colbarEl.hidden = false;

      refresh();
      q.disabled = false;
      q.addEventListener("input", refresh);
      sortCol.addEventListener("change", refresh);
      sortDir.addEventListener("change", refresh);

      scrollEl.hidden = false;
    })
    .catch(function (e) {
      errEl.textContent = String(e.message || e);
      errEl.hidden = false;
    });
})();
  </script>
</body>
</html>
