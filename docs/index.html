<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <!-- beatoraja: Table URL にサイトのトップ（.json で終わらない URL）を入れたとき、jbmstable-parser がこの meta からヘッダー JSON を解決する -->
  <meta name="bmstable" content="table/filtered_header.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>K Original難易度表</title>
  <link rel="stylesheet" href="assets/k-original-ui.css" />
  <script src="assets/theme-toggle.js" defer></script>
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <h1 id="site-h1">K Original難易度表</h1>
      <button type="button" class="shadcn-btn" id="theme-toggle" aria-label="配色を切り替え">
        <span class="shadcn-btn-icon-wrap" id="theme-toggle-icon" aria-hidden="true"></span>
        <span class="shadcn-btn-text" id="theme-toggle-text">自動</span>
      </button>
    </header>
    <div id="meta" class="meta shadcn-card" hidden>
      <dl id="meta-dl"></dl>
    </div>
    <div class="filter-collapse shadcn-card">
      <button type="button" class="shadcn-btn filter-collapse-toggle" id="toolbar-panel-toggle" aria-expanded="false" aria-controls="toolbar-panel">
        <span>並び替え・絞り込み・列の表示</span>
        <span class="filter-chevron" aria-hidden="true">▼</span>
      </button>
      <div id="toolbar-panel" class="filter-collapse-panel" hidden role="region" aria-labelledby="toolbar-panel-toggle">
        <div class="sortbar sortbar-multi">
          <div class="sort-priority-row">
            <span class="sort-priority-label">優先順位1</span>
            <select id="sort-col-1" class="shadcn-select" aria-label="優先順位1の列" disabled>
              <option value="">（なし）</option>
            </select>
            <select id="sort-dir-1" class="shadcn-select sort-dir-select" aria-label="優先順位1の順序" disabled>
              <option value="asc">昇順</option>
              <option value="desc">降順</option>
            </select>
          </div>
          <div class="sort-priority-row">
            <span class="sort-priority-label">優先順位2</span>
            <select id="sort-col-2" class="shadcn-select" aria-label="優先順位2の列" disabled>
              <option value="">（なし）</option>
            </select>
            <select id="sort-dir-2" class="shadcn-select sort-dir-select" aria-label="優先順位2の順序" disabled>
              <option value="asc">昇順</option>
              <option value="desc">降順</option>
            </select>
          </div>
          <div class="sort-priority-row">
            <span class="sort-priority-label">優先順位3</span>
            <select id="sort-col-3" class="shadcn-select" aria-label="優先順位3の列" disabled>
              <option value="">（なし）</option>
            </select>
            <select id="sort-dir-3" class="shadcn-select sort-dir-select" aria-label="優先順位3の順序" disabled>
              <option value="asc">昇順</option>
              <option value="desc">降順</option>
            </select>
          </div>
        </div>
        <div class="toolbar">
          <label for="q">キーワード</label>
          <input type="search" id="q" class="shadcn-input" placeholder="タイトル・ハッシュなど" autocomplete="off" disabled />
          <span id="count" class="lead" style="margin:0"></span>
        </div>
        <div id="filter-src-bar" class="filter-src" hidden></div>
        <div id="colbar" class="colbar" hidden>
          <p class="colbar-lead">
            列の表示切替（1 列ごとにチェック）。追加の列にチェックを入れると表に出ます。
          </p>
          <div id="colbar-inner"></div>
        </div>
      </div>
    </div>
    <div id="err" class="err" hidden></div>
    <div class="scroll shadcn-card" id="scroll" hidden>
      <table id="tbl">
        <colgroup id="tbl-colgroup"></colgroup>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <footer class="site-footer">
      <a class="shadcn-link" href="./table/filtered_header.json" target="_blank" rel="noopener noreferrer">beatoraja 用難易度表ヘッダー（<code>filtered_header.json</code>）</a>
      <span class="footer-sep" aria-hidden="true">·</span>
      <a class="shadcn-link" href="./level-stats.html">統合難易度表別の曲数</a>
    </footer>
  </div>
  <script src="assets/pages-index-toolbar-collapse.js" defer></script>
  <script src="assets/pages-index-column-runtime.js" defer></script>
  <script src="assets/pages-index-main.js" defer></script>
</body>
</html>
