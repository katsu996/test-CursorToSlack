<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>難易度表別・レベル別の曲数</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #fff;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #59636e;
      --accent: #0969da;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      margin: 0;
      padding: 1rem 1rem 2rem;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 100%; margin: 0 auto; }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    .lead { color: var(--muted); margin: 0 0 1rem; font-size: 0.95rem; }
    .nav { margin-bottom: 1rem; font-size: 0.9rem; }
    .nav a { color: var(--accent); }
    .meta {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.88rem;
    }
    .meta dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 0.25rem 1rem; }
    .meta dt { color: var(--muted); }
    .meta dd { margin: 0; word-break: break-all; }
    .level-stats {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem 1rem;
      margin-bottom: 1rem;
    }
    .level-stats h2 {
      font-size: 1.05rem;
      margin: 0 0 0.35rem;
      font-weight: 600;
    }
    .level-stats .level-stats-note {
      margin: 0 0 0.75rem;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .level-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr));
      gap: 0.75rem;
    }
    .level-stats-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.65rem;
      background: #fafbfc;
      min-width: 0;
    }
    .level-stats-card h3 {
      font-size: 0.9rem;
      margin: 0 0 0.25rem;
      font-weight: 600;
      line-height: 1.35;
    }
    .level-stats-card .level-stats-sub {
      font-size: 0.76rem;
      color: var(--muted);
      margin: 0 0 0.4rem;
    }
    .level-stats-card .scroll-mini {
      overflow: auto;
      max-height: 14rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
    }
    .level-stats-card table {
      border-collapse: collapse;
      font-size: 0.78rem;
      width: 100%;
      white-space: nowrap;
    }
    .level-stats-card th, .level-stats-card td {
      border: 1px solid var(--border);
      padding: 0.25rem 0.4rem;
    }
    .level-stats-card th {
      background: #e8ecf1;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .err { color: #cf222e; padding: 1rem; background: #ffebe9; border-radius: 8px; }
    footer { margin-top: 1.25rem; font-size: 0.82rem; color: var(--muted); }
    code { background: #f0f3f6; padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.85em; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="nav"><a href="./index.html">← 難易度表一覧（トップ）</a></p>
    <h1>難易度表別・レベル別の曲数</h1>
    <p class="lead">
      Actions が生成する <code>table/level_stats.json</code> を表示します（トップの一覧とは別 URL）。
    </p>
    <div id="meta" class="meta" hidden>
      <dl id="meta-dl"></dl>
    </div>
    <div id="err" class="err" hidden></div>
    <section id="level-stats-section" class="level-stats" hidden>
      <h2>集計</h2>
      <p id="level-stats-note" class="level-stats-note"></p>
      <div id="level-stats-grid" class="level-stats-grid"></div>
    </section>
    <footer>
      データは <code>filter_table.py</code> が書き出します。手動運用はルートの <code>README.md</code>、処理の詳細は <code>docs/github-actions-songdata-table-filter.md</code> を参照。
    </footer>
  </div>
  <script>
(function () {
  var metaEl = document.getElementById("meta");
  var metaDl = document.getElementById("meta-dl");
  var errEl = document.getElementById("err");
  var levelSec = document.getElementById("level-stats-section");
  var levelNote = document.getElementById("level-stats-note");
  var levelGrid = document.getElementById("level-stats-grid");

  fetch("./table/level_stats.json", { cache: "no-store" })
    .then(function (r) {
      if (!r.ok) throw new Error("level_stats.json を取得できません (" + r.status + ")。フィルタがスキップされたビルドではファイルが無いことがあります。");
      return r.json();
    })
    .then(function (ld) {
      metaDl.innerHTML = "";
      if (ld.sql_where) {
        var dt = document.createElement("dt");
        dt.textContent = "SQL 条件";
        var dd = document.createElement("dd");
        dd.textContent = String(ld.sql_where);
        metaDl.appendChild(dt);
        metaDl.appendChild(dd);
      }
      if (ld.version != null) {
        var dt2 = document.createElement("dt");
        dt2.textContent = "集計 JSON の version";
        var dd2 = document.createElement("dd");
        dd2.textContent = String(ld.version);
        metaDl.appendChild(dt2);
        metaDl.appendChild(dd2);
      }
      metaEl.hidden = metaDl.children.length === 0;

      if (!ld || !Array.isArray(ld.sources) || !ld.sources.length) {
        errEl.textContent = "level_stats.json に sources がありません（空の集計）。";
        errEl.hidden = false;
        return;
      }

      var lf = ld.level_field ? String(ld.level_field) : "level";
      levelNote.textContent =
        "各元難易度表について、songdata.db の SQL 条件でフィルタに通ったデータ行を、表 JSON の列「" +
        lf +
        "」の値ごとに数えたものです（マージの重複除去より前の件数のため、トップ一覧の行数とは一致しません。同一譜面が複数表に載っている場合は表ごとに 1 行ずつ数えます）。";
      levelGrid.innerHTML = "";
      ld.sources.forEach(function (src) {
        var card = document.createElement("div");
        card.className = "level-stats-card";
        var h3 = document.createElement("h3");
        var shortN = (src.short_name && String(src.short_name).trim()) || "";
        var disp = (src.display_name && String(src.display_name).trim()) || ("表 " + (src.index || ""));
        h3.textContent = shortN ? "[" + shortN + "] " + disp : disp;
        card.appendChild(h3);
        var sub = document.createElement("p");
        sub.className = "level-stats-sub";
        sub.textContent = "条件通過 " + (src.total_filtered != null ? src.total_filtered : "—") + " 行（重複除去前）";
        card.appendChild(sub);
        var wrap = document.createElement("div");
        wrap.className = "scroll-mini";
        var tbl = document.createElement("table");
        var thead = document.createElement("thead");
        var trh = document.createElement("tr");
        var th1 = document.createElement("th");
        th1.textContent = lf;
        var th2 = document.createElement("th");
        th2.textContent = "曲数";
        trh.appendChild(th1);
        trh.appendChild(th2);
        thead.appendChild(trh);
        tbl.appendChild(thead);
        var tb = document.createElement("tbody");
        var bl = src.by_level && typeof src.by_level === "object" ? src.by_level : {};
        Object.keys(bl).forEach(function (k) {
          var tr = document.createElement("tr");
          var td1 = document.createElement("td");
          td1.textContent = k;
          var td2 = document.createElement("td");
          td2.className = "num";
          td2.textContent = String(bl[k]);
          tr.appendChild(td1);
          tr.appendChild(td2);
          tb.appendChild(tr);
        });
        tbl.appendChild(tb);
        wrap.appendChild(tbl);
        card.appendChild(wrap);
        levelGrid.appendChild(card);
      });
      levelSec.hidden = false;
    })
    .catch(function (e) {
      errEl.textContent = String(e.message || e);
      errEl.hidden = false;
    });
})();
  </script>
</body>
</html>
