# 別リポジトリへコピーして使える GitHub Pages 用ワークフロー。
# push 時に songdata.db と設定が揃っていれば難易度表 JSON を生成し、docs/ 全体を公開する。
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build filtered difficulty table (optional)
        env:
          SITE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/table
        run: python3 tools/table-filter/filter_table.py --config tools/table-filter/filter_config.json

      - name: Build merged table for Pages top page
        run: python3 tools/table-filter/build_pages_table.py --config tools/table-filter/filter_config.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
