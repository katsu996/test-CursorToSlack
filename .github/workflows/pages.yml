# 別リポジトリへコピーして使える GitHub Pages 用ワークフロー。
# push 時に songdata.db（Release 取得）と設定が揃っていれば難易度表 JSON を生成し、docs/ 全体を公開する。
# build / deploy のジョブ分割は actions/deploy-pages の推奨構成（starter-workflows の Pages テンプレートと同様）。
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note for manual runs (logged only)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 同一リポジトリの「Latest」として公開されている GitHub Release から
      # songdata.db を取得する（タグは gh が解決。手順は docs/github-releases-songdata.md）。
      - name: Download songdata.db from latest GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p data
          echo "Latest release (for logs): $(gh release view -R "${{ github.repository }}" --json tagName -q .tagName)"
          gh release download -R "${{ github.repository }}" -p songdata.db -O data/songdata.db
          test -s data/songdata.db

      - name: Workflow dispatch note
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "workflow_dispatch note=${{ github.event.inputs.note }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install ruff
        run: pip install "ruff~=0.9.0"

      - name: Ruff check
        run: python3 -m ruff check tools/table-filter/

      - name: filter_config.example.json のキー検証
        run: python3 tools/table-filter/check_filter_config_example_sync.py

      - name: Unit tests (table-filter)
        working-directory: tools/table-filter
        run: python3 -m unittest discover -s tests -v

      - name: Build filtered difficulty table
        run: python3 tools/table-filter/filter_table.py --config tools/table-filter/filter_config.json

      - name: Build merged table for Pages top page
        run: python3 tools/table-filter/build_pages_table.py --config tools/table-filter/filter_config.json

      - name: Validate browser_rows meta.pages_ui
        run: python3 tools/table-filter/check_browser_rows_pages_ui.py --path docs/table/browser_rows.json

      - name: Smoke check generated JSON
        run: python3 tools/table-filter/smoke_check_outputs.py --config tools/table-filter/filter_config.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
