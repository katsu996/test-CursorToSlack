# 別リポジトリへコピーして使える GitHub Pages 用ワークフロー。
# push 時に songdata.db（リポジトリ内ファイルまたは Release 取得）と設定が揃っていれば難易度表 JSON を生成し、docs/ 全体を公開する。
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      note:
        description: 手動実行メモ（ログ用・任意）
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # リポジトリ変数 SONGDATA_RELEASE_TAG（例: songdata-2026-05-26）を設定すると、
      # 同一リポジトリの GitHub Release から data/songdata.db を取得する。
      # 手順は docs/github-releases-songdata.md を参照。
      - name: Download songdata.db from GitHub Release (optional)
        if: ${{ vars.SONGDATA_RELEASE_TAG != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p data
          gh release download "${{ vars.SONGDATA_RELEASE_TAG }}" \
            -R "${{ github.repository }}" \
            -p songdata.db \
            -O data/songdata.db

      - name: Require songdata.db for filter (when Release tag is set)
        if: ${{ vars.SONGDATA_RELEASE_TAG != '' }}
        run: |
          test -s data/songdata.db

      - name: Workflow dispatch note
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "workflow_dispatch note=${{ github.event.inputs.note }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install ruff
        run: pip install "ruff~=0.9.0"

      - name: Ruff check
        run: python3 -m ruff check tools/table-filter/

      - name: filter_config.example.json のキー検証
        run: python3 tools/table-filter/check_filter_config_example_sync.py

      - name: Unit tests (table-filter)
        working-directory: tools/table-filter
        run: python3 -m unittest discover -s tests -v

      - name: Build filtered difficulty table (optional)
        run: python3 tools/table-filter/filter_table.py --config tools/table-filter/filter_config.json

      - name: Build merged table for Pages top page
        run: python3 tools/table-filter/build_pages_table.py --config tools/table-filter/filter_config.json

      - name: Validate browser_rows meta.pages_ui
        run: python3 tools/table-filter/check_browser_rows_pages_ui.py --path docs/table/browser_rows.json

      - name: Smoke check generated JSON
        run: python3 tools/table-filter/smoke_check_outputs.py --config tools/table-filter/filter_config.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
